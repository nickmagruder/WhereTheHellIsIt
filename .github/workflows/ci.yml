name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Type-check · Test · CDK Synth
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for --affected flag in future

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm turbo lint

      - name: Type-check
        run: pnpm turbo type-check

      - name: Test
        run: pnpm turbo test

      - name: CDK synth (validates CDK compiles + infrastructure is valid)
        working-directory: infra
        run: npx cdk synth
        env:
          # Environment-agnostic synth — no real AWS account needed in CI
          CDK_DEFAULT_REGION: us-east-1

      - name: Security audit
        run: pnpm audit --audit-level=high
        # Allow the workflow to continue if audit finds only moderate/low issues
        continue-on-error: false
